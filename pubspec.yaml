name: ZeroStress
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  syncfusion_flutter_gauges: ^33.2.3
  fl_chart: ^1.2.0
  http: 
  polar: ^6.0.0
  flutter_local_notifications: 
  timezone:
  flutter_timezone:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
